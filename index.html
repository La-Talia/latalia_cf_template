<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LATALIA C++ CF Template — Cheatsheet</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0c10;
    --surface:  #111318;
    --card:     #161a22;
    --border:   #1f2430;
    --accent:   #00e5ff;
    --accent2:  #ff6b35;
    --accent3:  #a8ff3e;
    --accent4:  #c77dff;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --keyword:  #ff6b35;
    --type:     #00e5ff;
    --fn:       #a8ff3e;
    --str:      #ffd60a;
    --comment:  #4a5568;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── grid noise texture ── */
  body::before {
    content:'';
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* ── glow orbs ── */
  .orb {
    position:fixed; border-radius:50%; filter:blur(120px); pointer-events:none; z-index:0; opacity:.18;
  }
  .orb1 { width:500px;height:500px;background:var(--accent);  top:-100px; left:-100px; }
  .orb2 { width:400px;height:400px;background:var(--accent4); bottom:-80px; right:-80px; }
  .orb3 { width:300px;height:300px;background:var(--accent2); top:40%; left:60%; }

  /* ── header ── */
  header {
    position:relative; z-index:10;
    padding: 48px 40px 24px;
    border-bottom: 1px solid var(--border);
    display:flex; align-items:flex-end; gap:24px; flex-wrap:wrap;
  }
  .logo {
    font-size:2.4rem; font-weight:800; line-height:1;
    background: linear-gradient(120deg, var(--accent), var(--accent4));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    letter-spacing:-1px;
  }
  .logo span { -webkit-text-fill-color: var(--accent2); }
  .subtitle {
    font-family:'JetBrains Mono',monospace;
    font-size:.75rem; color:var(--muted);
    background:var(--surface); border:1px solid var(--border);
    padding:4px 10px; border-radius:4px;
    margin-bottom:4px;
  }

  /* ── search bar ── */
  .search-wrap {
    position:relative; z-index:10;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
  }
  #search {
    width:100%; max-width:600px;
    background:var(--surface); border:1px solid var(--border);
    color:var(--text);
    font-family:'JetBrains Mono',monospace; font-size:.9rem;
    padding: 12px 20px 12px 44px;
    border-radius:8px; outline:none;
    transition: border-color .2s, box-shadow .2s;
  }
  #search:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,229,255,.12); }
  #search::placeholder { color:var(--muted); }
  .search-icon {
    position:absolute; left:55px; top:50%; transform:translateY(-50%);
    color:var(--muted); font-size:1rem; pointer-events:none;
  }
  #result-count {
    display:inline-block; margin-left:16px;
    font-family:'JetBrains Mono',monospace; font-size:.75rem; color:var(--muted);
  }

  /* ── tabs ── */
  .tabs {
    position:relative; z-index:10;
    display:flex; gap:4px; flex-wrap:wrap;
    padding: 16px 40px 0;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    font-family:'JetBrains Mono',monospace; font-size:.75rem;
    padding:8px 16px; border-radius:6px 6px 0 0;
    border:1px solid transparent; border-bottom:none;
    cursor:pointer; transition:all .15s;
    color:var(--muted); background:transparent;
    position:relative; bottom:-1px;
  }
  .tab:hover { color:var(--text); background:var(--surface); }
  .tab.active {
    color:var(--accent); background:var(--card);
    border-color:var(--border); border-bottom-color:var(--card);
  }
  .tab-dot { display:inline-block; width:6px;height:6px; border-radius:50%; margin-right:6px; }

  /* ── main grid ── */
  main {
    position:relative; z-index:10;
    padding: 32px 40px 80px;
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 16px;
  }

  /* ── cards ── */
  .card {
    background:var(--card); border:1px solid var(--border);
    border-radius:10px; overflow:hidden;
    transition:border-color .2s, transform .15s, box-shadow .2s;
    animation: fadeIn .3s ease both;
  }
  .card:hover {
    border-color:rgba(0,229,255,.3);
    transform:translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,229,255,.08);
  }
  .card.hidden { display:none; }

  @keyframes fadeIn {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .card-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px;
    border-bottom:1px solid var(--border);
    background:rgba(255,255,255,.02);
  }
  .card-title {
    font-family:'JetBrains Mono',monospace; font-size:.7rem; font-weight:700;
    text-transform:uppercase; letter-spacing:.08em;
  }
  .card-tag {
    font-family:'JetBrains Mono',monospace; font-size:.62rem;
    padding:2px 8px; border-radius:20px;
    background:rgba(255,255,255,.06); color:var(--muted);
  }

  /* ── rows inside card ── */
  .row {
    display:grid; grid-template-columns:1fr 1fr;
    border-bottom:1px solid var(--border);
    transition: background .15s;
    cursor:pointer;
  }
  .row:last-child { border-bottom:none; }
  .row:hover { background:rgba(255,255,255,.03); }
  .row:hover .copy-hint { opacity:1; }

  .cell {
    padding:9px 14px;
    font-family:'JetBrains Mono',monospace; font-size:.78rem;
    line-height:1.5;
  }
  .cell:first-child {
    color:var(--accent); border-right:1px solid var(--border);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .cell:last-child { color:var(--muted); font-size:.72rem; }

  .copy-hint {
    opacity:0; transition:opacity .15s;
    font-size:.6rem; color:var(--accent3); margin-left:6px;
  }

  /* ── code coloring ── */
  .kw  { color:var(--keyword); }
  .tp  { color:var(--type); }
  .fn  { color:var(--fn); }
  .st  { color:var(--str); }
  .cm  { color:var(--comment); }
  .hl  { background:rgba(0,229,255,.08); border-radius:3px; padding:0 2px; }

  /* ── copy toast ── */
  #toast {
    position:fixed; bottom:32px; right:32px; z-index:1000;
    background:var(--accent3); color:#0a0c10;
    font-family:'JetBrains Mono',monospace; font-size:.78rem; font-weight:700;
    padding:10px 20px; border-radius:6px;
    transform:translateY(20px); opacity:0;
    transition:all .25s;
    pointer-events:none;
  }
  #toast.show { transform:translateY(0); opacity:1; }

  /* ── section divider ── */
  .section-label {
    grid-column:1/-1;
    font-size:.65rem; font-weight:700; text-transform:uppercase;
    letter-spacing:.15em; color:var(--muted);
    padding:16px 0 4px;
    display:flex; align-items:center; gap:12px;
  }
  .section-label::after {
    content:''; flex:1; height:1px; background:var(--border);
  }

  /* ── no results ── */
  #no-results {
    grid-column:1/-1; display:none;
    text-align:center; padding:80px 20px;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace; font-size:.85rem;
  }

  /* ── responsive ── */
  @media(max-width:600px) {
    header,main,.search-wrap,.tabs { padding-left:16px; padding-right:16px; }
    main { grid-template-columns:1fr; }
    .logo { font-size:1.8rem; }
  }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<header>
  <div>
    <div class="logo">CF<span>++</span> Template</div>
    <div style="color:var(--muted);font-size:.85rem;margin-top:4px;">Python-style C++ for Codeforces</div>
  </div>
  <div class="subtitle">Click any row to copy • Search to filter</div>
</header>

<div class="search-wrap">
  <span class="search-icon">⌕</span>
  <input id="search" type="text" placeholder="Search functions, macros, snippets..." autocomplete="off">
  <span id="result-count"></span>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" data-filter="all">
    <span class="tab-dot" style="background:var(--accent)"></span>All
  </div>
  <div class="tab" data-filter="io">
    <span class="tab-dot" style="background:#ffd60a"></span>I/O
  </div>
  <div class="tab" data-filter="loops">
    <span class="tab-dot" style="background:var(--accent3)"></span>Loops
  </div>
  <div class="tab" data-filter="list">
    <span class="tab-dot" style="background:var(--accent)"></span>List
  </div>
  <div class="tab" data-filter="dict">
    <span class="tab-dot" style="background:var(--accent2)"></span>Dict/Set
  </div>
  <div class="tab" data-filter="string">
    <span class="tab-dot" style="background:#ff9f1c"></span>String
  </div>
  <div class="tab" data-filter="math">
    <span class="tab-dot" style="background:var(--accent4)"></span>Math
  </div>
  <div class="tab" data-filter="ds">
    <span class="tab-dot" style="background:#ff6b6b"></span>Data Structs
  </div>
  <div class="tab" data-filter="graph">
    <span class="tab-dot" style="background:#4ecdc4"></span>Graph
  </div>
  <div class="tab" data-filter="algo">
    <span class="tab-dot" style="background:#ffe66d"></span>Algorithms
  </div>
  <div class="tab" data-filter="macro">
    <span class="tab-dot" style="background:#a29bfe"></span>Macros
  </div>
</div>

<main id="grid">
  <div id="no-results">No results found. Try a different search term.</div>
</main>

<div id="toast">✓ Copied!</div>

<script>
const DATA = [

  { cat:'io', title:'Input', color:'#ffd60a', rows:[

// ── Build grid ──────────────────────────────────────────────────────────────
const grid    = document.getElementById('grid');
const noRes   = document.getElementById('no-results');
const allCards = [];

DATA.forEach(section => {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.cat = section.cat;
  card.dataset.text = (section.title + ' ' + section.rows.map(r=>r.join(' ')).join(' ')).toLowerCase();

  let rowsHTML = section.rows.map(([cpp, py]) => `
    <div class="row" data-cpp="${escHtml(cpp)}">
      <div class="cell">${hlCpp(cpp)}<span class="copy-hint">copy</span></div>
      <div class="cell">${escHtml(py)}</div>
    </div>`).join('');

  card.innerHTML = `
    <div class="card-header">
      <div class="card-title" style="color:${section.color}">${section.title}</div>
      <div class="card-tag">${section.cat}</div>
    </div>
    ${rowsHTML}`;

  grid.appendChild(card);
  allCards.push(card);
});

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function hlCpp(s) {
  const e = escHtml(s);
  return e
    .replace(/\b(int|ll|auto|void|bool|string|char|const|struct|class|while|for|if|else|return|true|false|nullptr)\b/g,'<span class="kw">$1</span>')
    .replace(/\b(vec|map|set|umap|uset|pq|pqmin|que|stk|deq|Graph|WGraph|DSU|Fenwick|SegTree|SparseTable|Compress|vi|vl|vvi)\b/g,'<span class="tp">$1</span>')
    .replace(/\b([a-z_][a-z_0-9]*)\s*(?=\()/g,'<span class="fn">$1</span>')
    .replace(/&lt;|&gt;/g, m => `<span class="kw">${m}</span>`);
}

// ── Copy on row click ───────────────────────────────────────────────────────
const toast = document.getElementById('toast');
let toastTimer;
grid.addEventListener('click', e => {
  const row = e.target.closest('.row');
  if (!row) return;
  const text = row.dataset.cpp;
  navigator.clipboard.writeText(text).then(() => {
    clearTimeout(toastTimer);
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
  });
});

// ── Search ──────────────────────────────────────────────────────────────────
const search  = document.getElementById('search');
const counter = document.getElementById('result-count');
let activeFilter = 'all';

function applyFilters() {
  const q = search.value.toLowerCase().trim();
  let visible = 0;
  allCards.forEach(card => {
    const matchCat = activeFilter === 'all' || card.dataset.cat === activeFilter;
    const matchQ   = !q || card.dataset.text.includes(q);
    const show = matchCat && matchQ;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  noRes.style.display = visible === 0 ? 'block' : 'none';
  counter.textContent = q || activeFilter !== 'all' ? `${visible} section${visible!==1?'s':''}` : '';
}

search.addEventListener('input', applyFilters);

// ── Tabs ────────────────────────────────────────────────────────────────────
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeFilter = tab.dataset.filter;
  applyFilters();
});

// ── Keyboard shortcut  / to focus search ────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== search) {
    e.preventDefault(); search.focus();
  }
  if (e.key === 'Escape') { search.value=''; applyFilters(); search.blur(); }
});
</script>
